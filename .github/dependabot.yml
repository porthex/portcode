# Dependabot keeps dependencies and pinned GitHub Actions current. Updates are
# grouped (patch + minor together) and use Conventional Commit messages so they
# flow into the changelog and release notes. Security updates for crates such as
# reqwest / tokio / tauri / keyring arrive here.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JavaScript / TypeScript frontend (pnpm uses the npm ecosystem).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - dependencies

  # Rust (Tauri) backend — the single crate lives in /src-tauri.
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
