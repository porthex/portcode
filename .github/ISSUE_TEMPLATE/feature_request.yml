name: Feature request
description: Suggest a new capability or improvement for Portcode.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Before filing, please skim
        [GOVERNANCE.md](https://github.com/porthex/portcode/blob/main/GOVERNANCE.md)
        for what belongs in the open-source core versus the reserved commercial
        surface — the scope check below helps us route your request quickly.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What is painful or impossible today?
      placeholder: "I'm always frustrated when…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Portcode to do? Describe the behavior or UX you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have thought about or tried.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope check (see GOVERNANCE.md)
      description: Where do you think this fits? We will confirm — this just speeds up triage.
      options:
        - Open-source core (agent loop, tools, permission gate, UI, Windows packaging, new providers via the Provider trait)
        - Not sure — please advise
        - Possibly reserved / commercial (fleet or org policy, admin console, managed BYOK gateway, audit-log retention, enterprise distribution)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, examples from other tools, or anything else that helps.
    validations:
      required: false

  - type: checkboxes
    id: hygiene
    attributes:
      label: Before you submit
      options:
        - label: I searched existing [issues](https://github.com/porthex/portcode/issues) and [Discussions](https://github.com/porthex/portcode/discussions) and did not find a duplicate.
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/porthex/portcode/blob/main/CODE_OF_CONDUCT.md).
          required: true
