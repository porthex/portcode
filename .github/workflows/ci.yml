name: CI

# Phase 0 quality gates: lint, format, type-check, and tests for both the
# TypeScript frontend and the Rust (Tauri) backend. Runs on every push to the
# `main` and `release` branches and on every pull request. This workflow
# performs NO telemetry, analytics, or network reporting — it only builds and
# tests the code.
#
# The full signed `tauri build` is intentionally NOT here; it is gated to
# tag/label and lives in the Phase 1 `release.yml` (Azure Trusted Signing).

on:
  push:
    branches: [main, release]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · format · typecheck · test)
    strategy:
      fail-fast: false
      matrix:
        # Windows + Linux. The frontend leg is pure JS (lint, format, types,
        # tests), so it needs no system libraries on either OS.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Type-check (tsc --noEmit)
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test

  rust:
    name: Rust (fmt · clippy · test)
    strategy:
      fail-fast: false
      matrix:
        # Windows (MSVC + WebView2) and Linux (GTK + WebKitGTK). Even
        # `clippy`/`test` compile the Tauri crate, which links against the
        # system WebKitGTK libraries — so the Linux leg installs them before
        # any cargo command runs.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Tauri v2 links against GTK 3 and WebKitGTK 4.1 (NOT the 4.0 that Tauri
      # v1 used). These -dev packages must be present before any cargo command
      # that compiles the crate (clippy and test both do).
      - name: Install Tauri v2 Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev
          # System-tray indicator dev package: the name differs by Ubuntu
          # release. 24.04 (today's ubuntu-latest) ships the Ayatana fork;
          # 22.04 carries the legacy libappindicator3-dev. Install whichever
          # resolves so this works regardless of where ubuntu-latest points.
          sudo apt-get install -y libayatana-appindicator3-dev \
            || sudo apt-get install -y libappindicator3-dev

      # The channel, targets, and rustfmt + clippy components are pinned by
      # `rust-toolchain.toml`, so rustup materializes the correct toolchain.
      - name: Materialize pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Single Rust crate today, so each command targets it via --manifest-path.
      # Switch to `--workspace` once `portcode-core` is extracted (Phase 2).
      - name: Format check (rustfmt)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

      - name: Lint (clippy — warnings are errors)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test (cargo test)
        run: cargo test --manifest-path src-tauri/Cargo.toml

  coverage:
    name: Coverage (frontend · main/release only)
    # Coverage is COUNTED only on the canonical branches — this job is gated to
    # pushes (the workflow's push trigger is branches:[main, release]) and never
    # runs on pull_request, so contributor PRs are never measured or gated on
    # coverage. See CONTRIBUTING "coverage is not a merge gate".
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage (Vitest + v8, enforces the threshold)
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: coverage/
