name: CI

# Phase 0 quality gates: lint, format, type-check, and tests for both the
# TypeScript frontend and the Rust (Tauri) backend. Runs on every push to the
# `main` and `release` branches and on every pull request. This workflow
# performs NO telemetry, analytics, or network reporting — it only builds and
# tests the code.
#
# The full signed `tauri build` is intentionally NOT here; it is gated to
# tag/label and lives in the Phase 1 `release.yml` (Azure Trusted Signing).

on:
  push:
    branches: [main, release]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · format · typecheck · test)
    strategy:
      fail-fast: false
      matrix:
        # Windows + Linux. The frontend leg is pure JS (lint, format, types,
        # tests), so it needs no system libraries on either OS.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # This job runs no git operations; don't leave the token in the checkout
          # (matches the wasm/coverage jobs). Hardens against token exfiltration.
          persist-credentials: false

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Type-check (tsc --noEmit)
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test

  rust:
    name: Rust (fmt · clippy · test)
    strategy:
      fail-fast: false
      matrix:
        # Windows (MSVC + WebView2) and Linux (GTK + WebKitGTK). Even
        # `clippy`/`test` compile the Tauri crate, which links against the
        # system WebKitGTK libraries — so the Linux leg installs them before
        # any cargo command runs.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # This job runs no git operations; don't leave the token in the checkout
          # (matches the wasm/coverage jobs). Hardens against token exfiltration.
          persist-credentials: false

      # Tauri v2 links against GTK 3 and WebKitGTK 4.1 (NOT the 4.0 that Tauri
      # v1 used). These -dev packages must be present before any cargo command
      # that compiles the crate (clippy and test both do).
      - name: Install Tauri v2 Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev
          # System-tray indicator dev package: the name differs by Ubuntu
          # release. 24.04 (today's ubuntu-latest) ships the Ayatana fork;
          # 22.04 carries the legacy libappindicator3-dev. Install whichever
          # resolves so this works regardless of where ubuntu-latest points.
          sudo apt-get install -y libayatana-appindicator3-dev \
            || sudo apt-get install -y libappindicator3-dev

      # The channel, targets, and rustfmt + clippy components are pinned by
      # `rust-toolchain.toml`, so rustup materializes the correct toolchain.
      - name: Materialize pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root: covers both `src-tauri` and the extracted
          # `crates/portcode-sync` member (Phase 1 of IOS_WEB_CLIENT_PLAN.md §5.1).
          workspaces: .

      # Now a Cargo workspace (`src-tauri` + `crates/portcode-sync`), so the
      # commands run `--workspace` across every member instead of targeting a
      # single manifest.
      - name: Format check (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (clippy — warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (cargo test)
        run: cargo test --workspace

  # ── wasm compile gate for the browser client (IOS_WEB_CLIENT_PLAN §5.3/§5.4) ──
  # Phase 1's exit criterion was that `portcode-sync` compiles to
  # wasm32-unknown-unknown; Phase 2 adds the real browser transport
  # (`transport_wasm.rs`) and the `portcode-wasm` `Session` cdylib that the PWA
  # loads. This job is the source of truth (the wasm leg CANNOT be fully verified
  # on low-RAM dev machines — per CLAUDE.md "verify Rust via CI") and gates BOTH
  # crates for the browser target. `src-tauri` (Tauri desktop) is never a wasm
  # target. Linux-only: the wasm build needs LLVM clang (Apple/MSVC clang can't
  # target wasm32), and one OS leg is enough to prove the compile.
  wasm:
    name: WASM (portcode-sync + portcode-wasm compile for wasm32)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # This job runs no git operations; don't leave the token in the checkout
          # (matches the coverage jobs). Hardens against a fork PR exfiltrating it.
          persist-credentials: false

      # LLVM clang is required to target wasm32 (Apple/MSVC clang cannot). Install
      # it explicitly so the job is self-contained and doesn't silently regress if
      # the runner image changes.
      - name: Install LLVM clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      # The pinned channel + components come from rust-toolchain.toml; add the
      # wasm target on top (it is not in the pinned `targets` list, which only
      # carries the desktop triples).
      - name: Materialize pinned Rust toolchain + wasm target
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          # Separate cache key from the native legs (different target dir).
          key: wasm
          # Only WRITE the cache from trusted (non-fork) runs on the canonical
          # branches; fork PRs still READ the cache but can't poison it.
          save-if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release') }}

      # Exit criterion 1: the shared crate compiles for the browser target.
      # Each crate's `.cargo/config.toml` supplies the getrandom_backend="wasm_js"
      # rustflag for this target.
      - name: Build portcode-sync for wasm32-unknown-unknown
        run: cargo build -p portcode-sync --target wasm32-unknown-unknown

      # Exit criterion 2 (§5.4): the `Session` wasm-bindgen wrapper — the interop
      # surface the PWA loads — compiles for the browser target. This gates the
      # real browser iroh dial + Noise handshake + the Tsify-generated TS types.
      - name: Build portcode-wasm for wasm32-unknown-unknown
        run: cargo build -p portcode-wasm --target wasm32-unknown-unknown

      # Clippy both wasm crates with warnings-as-errors, on the browser target —
      # the native `rust` job's `--workspace` clippy compiles `portcode-wasm` to an
      # EMPTY lib (it is `#![cfg(target_arch = "wasm32")]`), so its real code is
      # only linted here.
      - name: Clippy (wasm crates — warnings are errors)
        run: cargo clippy -p portcode-sync -p portcode-wasm --target wasm32-unknown-unknown -- -D warnings

      # Belt-and-suspenders audit (§5.3): a native-only tokio `net`/`rt` path
      # leaking into shared code would pull in `mio`, which does NOT build for
      # wasm — assert it is ABSENT from the wasm dependency tree.
      #
      # NOTE on `ring`: the plan's §4.3 assumed `ring` could not build for wasm and
      # this audit once also forbade it. The Phase 0 iOS spike disproved that — iroh
      # 1.0's browser leg uses the `tls-ring` feature, whose rustls `ring` provider
      # DOES compile to wasm32 (and is what makes `presets::N0` available). So `ring`
      # is now EXPECTED in the wasm tree via iroh, and is no longer a bleed-through
      # signal. We instead assert snow stays on its pure-Rust resolver: snow must
      # NOT be the thing pulling `ring` (its `std`/`ring` features would). Verified
      # by confirming snow's only crypto deps remain the RustCrypto/dalek crates.
      - name: Audit for native bleed-through (no mio; snow stays pure-Rust)
        run: |
          if cargo tree -p portcode-wasm --target wasm32-unknown-unknown -i mio 2>/dev/null | grep -q '^mio'; then
            echo "::error::mio leaked into the wasm build — a tokio net/rt path reached shared code"
            exit 1
          fi
          # snow must resolve to the pure-Rust backend (chacha20poly1305 +
          # curve25519-dalek + blake2), never `ring`. iroh legitimately pulls `ring`
          # (via tls-ring), so a blanket "no ring" check no longer works; instead
          # invert from `ring` and assert `snow` is NOT among its parents. If snow
          # appears, its std/ring feature leaked into the wasm build.
          if cargo tree -p portcode-wasm --target wasm32-unknown-unknown -i ring 2>/dev/null | grep -qi 'snow'; then
            echo "::error::snow pulled ring on wasm — its std/ring feature leaked (keep snow on the pure-Rust default-resolver)"
            exit 1
          fi
          echo "no mio on the wasm target; snow on its pure-Rust resolver — clean"

      # wasm-pack is what actually emits the browser package (`init()` + `_bg.wasm`
      # + the Tsify `.d.ts`) the PWA consumes (§5.3/§5.4) — build it so the FULL
      # interop surface (not just `cargo build`) is gated. `wasm-opt` is disabled in
      # the crate's `[package.metadata.wasm-pack]` because binaryen downloads a
      # binary at build time, which fails in this sandboxed runner (the Phase 0
      # spike hit the same); the wasm is functional without it, only larger.
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: wasm-pack build the Session wrapper (interop surface)
        run: wasm-pack build --target web crates/portcode-wasm

  coverage:
    name: Coverage (frontend · main/release only)
    # Coverage is COUNTED only on the canonical branches — this job is gated to
    # pushes (the workflow's push trigger is branches:[main, release]) and never
    # runs on pull_request, so contributor PRs are never measured or gated on
    # coverage. See CONTRIBUTING "coverage is not a merge gate".
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage (Vitest + v8, enforces the threshold)
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: coverage/

  coverage-rust:
    name: Rust coverage (main/release only)
    # Same policy as the frontend coverage job: counted on the canonical branches
    # only (the push trigger is branches:[main, release]); never on pull_request,
    # so contributor PRs are never measured or gated.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Tauri v2 Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf build-essential libssl-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Materialize pinned Rust toolchain + llvm-tools
        run: |
          rustup show
          rustup component add llvm-tools-preview

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Prebuilt binary — avoids compiling cargo-llvm-cov from source (which fails
      # on the pinned toolchain's deps and is too heavy for low-RAM machines).
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Rust coverage (cargo llvm-cov)
        run: cargo llvm-cov --manifest-path src-tauri/Cargo.toml --summary-only
