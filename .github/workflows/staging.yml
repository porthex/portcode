name: Staging

# Staging pre-release pipeline — feeds the in-app **staging update channel**
# AND produces the Android debug APK for sideloading tests.
#
# A staging build of Portcode is compiled with `PORTCODE_CHANNEL=staging`
# (the Rust side reads `option_env!("PORTCODE_CHANNEL")`). At RUNTIME such a
# build points its Tauri updater at a FIXED manifest URL:
#
#   https://github.com/porthex/portcode/releases/download/staging/latest.json
#
# i.e. a single GitHub Release with the fixed tag `staging`, marked PRERELEASE,
# whose assets are CLOBBERED on every staging build. Stable builds instead read
# `releases/latest/download/latest.json` — which resolves to the most recent
# *published, non-prerelease* Release. Keeping the `staging` Release a PRERELEASE
# is therefore load-bearing: it guarantees this rolling build NEVER becomes the
# `latest` pointer that stable clients follow. This workflow must never publish a
# non-prerelease and never touch that `latest` pointer.
#
# This mirrors `release.yml` (signed Windows pipeline) step-for-step, with three
# staging-specific differences:
#   1. It is BRANCH-triggered (`push` to `staging`), not tag-triggered.
#   2. It stamps a MONOTONICALLY INCREASING pre-release version
#      `<base>-staging.<run_number>` into the three version files so the built
#      binary self-reports it, and the manifest carries the same version. The
#      Tauri updater only offers an update when the manifest `version` is
#      strictly semver-greater than the installed build's version, so each
#      staging build must out-version the previous one — `github.run_number` is
#      monotonic across runs of this workflow and gives us exactly that.
#   3. It publishes to the FIXED `staging` prerelease tag with clobbering assets,
#      instead of creating a per-version tag.
#
# The Android APK job builds a debug-signed arm64 APK for sideload testing of
# the remote client. It is uploaded to the same rolling `staging` pre-release.
#
# ── SECURITY ──────────────────────────────────────────────────────────────────
# Identical secret-gating discipline to release.yml: secrets are mirrored into
# job `env` so step-level `if:` can detect their PRESENCE without ever
# interpolating a secret value into a run-step (which could leak it into logs).
# With no secrets configured the workflow still builds, computes checksums, and
# (on workflow_dispatch) uploads the artifacts for inspection — an UNSIGNED dry
# run that never hard-fails for missing secrets. A real signed staging build
# additionally requires the protected `release` environment and its
# owner-provisioned secrets (the SAME 8 secrets release.yml uses — no new
# secrets are introduced here):
#   Azure Trusted Signing (Authenticode):
#     AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#     AZURE_TS_ENDPOINT, AZURE_TS_ACCOUNT, AZURE_TS_CERT_PROFILE
#   Tauri updater (Ed25519, from `tauri signer generate`):
#     TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD

on:
  push:
    branches:
      - staging
  workflow_dispatch: {}

# Least privilege by default; the publish job opts up to `contents: write`.
permissions:
  contents: read

# Overlapping staging pushes cancel the older run — only the newest staging
# commit's build matters, and the assets are clobbered anyway.
concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging:
    name: Build · sign · publish staging prerelease (Windows)
    runs-on: windows-latest
    # Same protected environment as release.yml — it holds the signing secrets
    # and required reviewers. Reusing it means staging signs with the SAME keys.
    environment: release
    permissions:
      contents: write # create/update the `staging` Release and upload assets
    env:
      # Secrets mirrored to env so step-level `if:` can detect presence WITHOUT
      # interpolating the secret into a run-step. Each is an empty string when
      # the secret is unset. Same 8 names as release.yml — no new secrets.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TS_ENDPOINT: ${{ secrets.AZURE_TS_ENDPOINT }}
      AZURE_TS_ACCOUNT: ${{ secrets.AZURE_TS_ACCOUNT }}
      AZURE_TS_CERT_PROFILE: ${{ secrets.AZURE_TS_CERT_PROFILE }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # Channel + MSVC target + rustfmt/clippy are pinned by rust-toolchain.toml.
      - name: Materialize pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # IMPORTANT ORDERING: install BEFORE stamping versions.
      # `pnpm install --frozen-lockfile` requires package.json and
      # pnpm-lock.yaml to agree. The version stamp below rewrites package.json's
      # version, which would break a frozen install — so we install against the
      # committed (in-sync) files first, then stamp.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Compute the monotonic staging version ─────────────────────────────────
      # Base version comes from tauri.conf.json; the staging version is
      # `<base>-staging.<run_number>` (e.g. 5.0.0-staging.42). github.run_number
      # increases on every run of THIS workflow, so the version strictly
      # increases build-over-build — which is exactly what the Tauri updater
      # needs to decide one staging build supersedes another (semver compares the
      # numeric `-staging.N` identifier).
      - name: Compute staging version
        id: version
        shell: pwsh
        run: |
          $base = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $staging = "$base-staging.${{ github.run_number }}"
          "base=$base"       >> $env:GITHUB_OUTPUT
          "version=$staging" >> $env:GITHUB_OUTPUT
          Write-Host "Staging version: $staging (base $base, run #${{ github.run_number }})"

      # ── Stamp the staging version into the THREE version files ────────────────
      # These three must agree so the built binary self-reports the staging
      # version (tauri.conf.json is what the updater compares against at runtime).
      #
      # LOCKFILE NOTE: bumping Cargo.toml's [package] version means Cargo.lock's
      # `portcode` entry no longer matches. That is fine here because NOTHING in
      # this build uses `cargo ... --locked` / `--frozen`: `pnpm app:build` is
      # plain `tauri build`, and `tauri build` lets cargo update Cargo.lock
      # in-tree as needed. We do NOT commit any of these edits — they live only
      # in the CI checkout for the duration of this run. (We deliberately avoid
      # `cargo update -p portcode --precise <ver>`: it would need the prerelease
      # version to already be a valid registry version and adds nothing, since the
      # unlocked build resolves it anyway.) `pnpm install` already ran above, so
      # editing package.json now does not affect the frozen install.
      - name: Stamp staging version into version files
        shell: pwsh
        env:
          STAGING_VERSION: ${{ steps.version.outputs.version }}
          BASE_VERSION: ${{ steps.version.outputs.base }}
        run: |
          $ver  = $env:STAGING_VERSION
          $base = $env:BASE_VERSION

          # package.json — "version": "..."
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          ($pkg | ConvertTo-Json -Depth 100) | Set-Content -Encoding utf8 package.json

          # src-tauri/tauri.conf.json — "version": "..."
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $ver
          ($conf | ConvertTo-Json -Depth 100) | Set-Content -Encoding utf8 src-tauri/tauri.conf.json

          # src-tauri/Cargo.toml — bump ONLY the [package] version line. A
          # targeted regex on the first `version = "<base>"` after [package]
          # avoids touching any dependency version pins elsewhere in the file.
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $escaped = [regex]::Escape($base)
          $pattern = "(?ms)^(\[package\].*?^version\s*=\s*"")$escaped("")"
          $cargo = [regex]::Replace($cargo, $pattern, "`${1}$ver`${2}", 1)
          Set-Content -Encoding utf8 src-tauri/Cargo.toml $cargo

          Write-Host "Stamped $ver into package.json, tauri.conf.json, Cargo.toml"
          Select-String -Path package.json -Pattern '"version"' | Select-Object -First 1
          Select-String -Path src-tauri/tauri.conf.json -Pattern '"version"' | Select-Object -First 1
          Select-String -Path src-tauri/Cargo.toml -Pattern '^version' | Select-Object -First 1

      # ── Supply-chain gate (same as release.yml): licenses · advisories · bans ─
      - name: Supply-chain audit (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2.0.20
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check
          arguments: "--all-features"
          command-arguments: "--config deny.toml"

      # ── Build the NSIS installer with the STAGING channel baked in ────────────
      # PORTCODE_CHANNEL=staging is read at compile time via
      # `option_env!("PORTCODE_CHANNEL")` by the Rust side, so the binary knows
      # to fetch its manifest from the fixed `staging` prerelease URL. The env is
      # set on the build step so it is present while cargo compiles. As in
      # release.yml, createUpdaterArtifacts is NOT enabled — the NSIS setup.exe
      # IS the updater target; we sign it afterward.
      - name: Build app (tauri build → NSIS)
        env:
          PORTCODE_CHANNEL: staging
        run: pnpm app:build

      - name: Locate installer + read version
        id: artifact
        shell: pwsh
        run: |
          $dir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem -Path $dir -Filter *-setup.exe -ErrorAction Stop | Select-Object -First 1
          if (-not $exe) { throw "No NSIS *-setup.exe found under $dir" }
          $ver = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          "path=$($exe.FullName)"   >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)"       >> $env:GITHUB_OUTPUT
          "dir=$dir"                >> $env:GITHUB_OUTPUT
          "version=$ver"            >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $($exe.FullName)  (v$ver)"

      # ── Authenticode signing via Azure Trusted Signing (SECRET-GATED) ─────────
      - name: Azure Trusted Signing (Authenticode)
        if: env.AZURE_CLIENT_ID != '' && env.AZURE_TS_ENDPOINT != ''
        uses: Azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TS_CERT_PROFILE }}
          files-folder: ${{ steps.artifact.outputs.dir }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Note — Authenticode signing skipped (no Azure secrets)
        if: env.AZURE_CLIENT_ID == '' || env.AZURE_TS_ENDPOINT == ''
        shell: pwsh
        run: Write-Host "::warning title=Unsigned staging build::Azure Trusted Signing secrets absent — installer is NOT Authenticode-signed. Expected for dry runs."

      # ── Updater signature (SECRET-GATED) — MUST run AFTER Authenticode ────────
      # Same ordering rationale as release.yml: Authenticode embeds a certificate
      # into the binary, so the Ed25519 updater signature must be taken over the
      # FINAL bytes or the updater would reject the download. Key + password are
      # read from env (never passed on argv, so they can't surface in logs).
      - name: Sign updater artifact (tauri signer sign)
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: pwsh
        run: pnpm tauri signer sign "${{ steps.artifact.outputs.path }}"

      - name: Note — updater signature skipped (no updater key)
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        shell: pwsh
        run: Write-Host "::warning title=No updater manifest::TAURI_SIGNING_PRIVATE_KEY absent — skipping updater signature + latest.json. Staging auto-update won't be offered for this build."

      # ── SHA-256 checksums (over the FINAL bytes, post-Authenticode) ───────────
      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $dir = "${{ steps.artifact.outputs.dir }}"
          $lines = foreach ($f in Get-ChildItem -Path $dir -Filter *-setup.exe) {
            $h = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLower()
            "$h  $($f.Name)"
          }
          $lines | Set-Content -Encoding ascii "$dir/SHA256SUMS.txt"
          Get-Content "$dir/SHA256SUMS.txt"

      # ── Updater manifest latest.json (SECRET-GATED; needs the .sig above) ─────
      # CRITICAL: the download URL points at the FIXED `staging` tag, not at this
      # run's commit/version. The staging Release's assets are clobbered each
      # build, so the tag-stable URL always serves the current staging installer.
      # The manifest `version` carries the monotonic `-staging.N` so installed
      # staging clients see a strictly-greater version and update.
      - name: Generate updater manifest (latest.json)
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: pwsh
        run: |
          $exe  = "${{ steps.artifact.outputs.path }}"
          $name = "${{ steps.artifact.outputs.name }}"
          $ver  = "${{ steps.artifact.outputs.version }}"
          $dir  = "${{ steps.artifact.outputs.dir }}"
          if (-not (Test-Path "$exe.sig")) { throw "Expected updater signature $exe.sig not found" }
          $sig = (Get-Content "$exe.sig" -Raw).Trim()
          # Fixed `staging` tag — NOT github.ref_name — so the URL is stable
          # across builds and matches the runtime endpoint baked into staging
          # builds (releases/download/staging/<setup-exe-name>).
          $url = "https://github.com/${{ github.repository }}/releases/download/staging/$name"
          $manifest = [ordered]@{
            version   = $ver
            notes     = "Portcode staging $ver (rolling). Auto-installed by staging-channel builds."
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $sig; url = $url }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 "$dir/latest.json"
          Get-Content "$dir/latest.json"

      # ── Publish to the FIXED `staging` PRERELEASE (push events) ───────────────
      # Idempotent + clobbering: if the `staging` Release exists, upload assets
      # with --clobber and re-assert --prerelease; otherwise create it as a
      # prerelease. We NEVER drop --prerelease, so this Release can never become
      # `releases/latest` (the stable channel pointer).
      #
      # TAG-REUSE BEHAVIOUR (maintainer-confirmable): `gh release upload staging
      # --clobber` leaves the existing `staging` tag pointing at whatever commit
      # FIRST created the Release; it does NOT move the tag to this run's commit.
      # That is acceptable and intentional here — staging clients only consume
      # the ASSETS at the tag-stable URL, and those assets ARE refreshed every
      # build. The `staging` tag is just a stable container for rolling assets,
      # not a source-of-truth pointer to the staging commit.
      - name: Publish staging prerelease (Windows assets)
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dir = "${{ steps.artifact.outputs.dir }}"
          $assets = @()
          $assets += (Get-ChildItem -Path $dir -Filter *-setup.exe).FullName
          if (Test-Path "$dir/SHA256SUMS.txt") { $assets += "$dir/SHA256SUMS.txt" }
          Get-ChildItem -Path $dir -Filter *.sig -ErrorAction SilentlyContinue | ForEach-Object { $assets += $_.FullName }
          if (Test-Path "$dir/latest.json")    { $assets += "$dir/latest.json" }
          Write-Host "Assets:"; $assets | ForEach-Object { Write-Host "  $_" }
          # Create the rolling `staging` prerelease if absent, else update + clobber.
          gh release view staging *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create staging @assets `
              --prerelease `
              --title "Staging (rolling)" `
              --notes "Rolling staging build. Auto-installed by staging-channel Portcode builds."
          } else {
            # Re-assert prerelease (never let it flip to a normal release) then
            # clobber the assets in place.
            gh release edit staging --prerelease
            gh release upload staging @assets --clobber
          }

      # ── Dry run (workflow_dispatch): keep artifacts to inspect, don't publish ─
      - name: Upload build artifacts (dry run)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v7
        with:
          name: portcode-staging-unpublished
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + NDK
        run: |
          sdkmanager "platforms;android-36" "ndk;${NDK_VERSION}"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Materialize pinned Rust toolchain
        run: rustup show

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # RELEASE + arm64-only keeps the APK ~50-80 MB. A debug universal build is
      # ~1.2 GB (4 ABIs x an unstripped native lib); release strips symbols (see the
      # Cargo.toml [profile.release]) and one ABI covers all modern phones.
      - name: Build the release APK (arm64)
        run: pnpm tauri android build --apk --target aarch64

      - name: Sign the APK with an ephemeral keystore
        shell: bash
        run: |
          # `tauri android build` leaves the release APK UNSIGNED, so it won't install.
          # Mint a throwaway keystore and zipalign + sign it so it sideloads.
          keytool -genkeypair -v -keystore "$RUNNER_TEMP/staging.jks" \
            -alias staging -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass changeit -keypass changeit \
            -dname "CN=Portcode Staging, O=Porthex"
          bt="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)"
          unsigned="$(find src-tauri/gen/android/app/build/outputs -name '*-release-unsigned.apk' | head -1)"
          if [ -z "$unsigned" ]; then
            echo "no unsigned release apk found; available apks:"
            find src-tauri/gen/android/app/build/outputs -name '*.apk'
            exit 1
          fi
          echo "Unsigned APK: $unsigned"
          mkdir -p signed-apk
          out="signed-apk/portcode-arm64-release.apk"
          "$bt/zipalign" -f 4 "$unsigned" "$out"
          "$bt/apksigner" sign --ks "$RUNNER_TEMP/staging.jks" \
            --ks-pass pass:changeit --ks-key-alias staging --key-pass pass:changeit "$out"
          "$bt/apksigner" verify "$out"
          ls -lh signed-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: portcode-android-staging
          path: signed-apk/*.apk
          if-no-files-found: error

      - name: Publish APK to staging prerelease
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Wait for the Windows job to have created the release (it runs in parallel).
          # Retry for up to 3 minutes.
          for i in $(seq 1 18); do
            if gh release view staging --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for staging release to exist (attempt $i/18)…"
            sleep 10
          done
          gh release upload staging signed-apk/portcode-arm64-release.apk \
            --repo "$GITHUB_REPOSITORY" --clobber
