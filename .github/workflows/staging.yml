name: Staging build

# On-demand (button) + push-to-`staging` builds of an UNSIGNED Windows installer and
# the debug Android APK, published to a rolling GitHub PRE-RELEASE for testing.
#
# This is NOT a production release (that path is release.yml + release-please, signed
# via Azure Trusted Signing on the `release` branch). Here:
#   * Windows = unsigned NSIS installer (SmartScreen warns → "More info" → "Run anyway").
#   * Android = debug-signed APK (enable "install unknown apps" to sideload).
# Both are attached to the single rolling `staging` pre-release, regenerated each run.
#
# To deploy: push to `staging` (e.g. merge `main` into it), or click "Run workflow".

on:
  workflow_dispatch:
  push:
    branches: [staging]

permissions:
  contents: write # create/update the pre-release + upload assets

concurrency:
  group: staging-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows installer (unsigned)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # `tauri.conf.json` configures the updater (a real pubkey), so a `tauri build`
      # may want a signing key to sign update artifacts. The production key is a
      # release secret; for staging we mint an EPHEMERAL key so the build always
      # succeeds — staging builds never auto-update, so the throwaway key is inert.
      - name: Mint an ephemeral updater signing key
        shell: bash
        run: |
          # Best-effort: if `tauri build` needs an updater key it now has one; if the
          # updater artifacts are disabled (default), the key is simply unused. Either
          # way a signer-flag quirk must not fail the build, so this is non-fatal.
          if pnpm tauri signer generate -w "$RUNNER_TEMP/staging.key" -p "" --force; then
            # Pass the key by PATH (Tauri supports TAURI_SIGNING_PRIVATE_KEY_PATH) to
            # avoid a multiline GITHUB_ENV heredoc (the key file has no trailing
            # newline, which broke the `<<__EOF__` delimiter).
            echo "TAURI_SIGNING_PRIVATE_KEY_PATH=$RUNNER_TEMP/staging.key" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> "$GITHUB_ENV"
          else
            echo "::warning::tauri signer generate failed; building without an updater key"
          fi

      - name: Build the Windows installer (release, NSIS)
        run: pnpm tauri build

      - name: Upload the installer
        uses: actions/upload-artifact@v7
        with:
          name: portcode-windows-staging
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + NDK
        run: |
          sdkmanager "platforms;android-36" "ndk;${NDK_VERSION}"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Materialize pinned Rust toolchain
        run: rustup show

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build the debug APK
        run: pnpm tauri android build --apk --debug

      - name: Upload the APK
        uses: actions/upload-artifact@v7
        with:
          name: portcode-android-staging
          path: src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error

  publish:
    name: Publish the staging pre-release
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download both build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist-staging

      - name: Roll the staging pre-release
        run: |
          assets=$(find dist-staging -type f \( -name '*.exe' -o -name '*.apk' \))
          echo "Assets found:"; echo "$assets"
          cat > "$RUNNER_TEMP/notes.md" <<EOF
          Rolling **unsigned test build** from commit ${GITHUB_SHA} — NOT a production release.

          - **Windows** — unsigned NSIS installer. SmartScreen will warn (More info → Run anyway).
          - **Android** — debug-signed APK. Enable "install unknown apps" to sideload. It is a REMOTE CLIENT: open the desktop Portcode, go to Settings → Phone Sync for a QR, then pair.

          Built by .github/workflows/staging.yml on each push to the staging branch (or via Run workflow).
          EOF
          # Rolling release: drop the previous staging release + tag, then recreate
          # so the assets are always the latest build (no stale duplicates).
          gh release delete staging --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create staging $assets \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Staging build (latest)" \
            --notes-file "$RUNNER_TEMP/notes.md"
