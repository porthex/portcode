# Pin the toolchain so every contributor (and CI) builds Portcode with the
# same channel and the MSVC target, and automatically has rustfmt + clippy.
# Additional targets (Linux, mobile) are added here when those platforms land.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
targets = ["x86_64-pc-windows-msvc"]
profile = "minimal"
