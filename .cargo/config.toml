# Workspace Cargo config.
#
# Phase 1 (docs/IOS_WEB_CLIENT_PLAN.md §5.1) turned `src-tauri` into a workspace
# member. Cargo's default for a workspace is a SHARED `target/` at the workspace
# root — which moved the desktop binary from `src-tauri/target/debug/portcode.exe`
# to `<root>/target/debug/portcode.exe` and broke every path that still points at
# the old per-crate location (the WebdriverIO smoke `application` path, the
# release-workflow bundle globs, RELEASE.md). Pin the target dir back to
# `src-tauri/target` so all those references keep resolving unchanged. The path is
# resolved relative to this config's parent (the workspace root).
[build]
target-dir = "src-tauri/target"
