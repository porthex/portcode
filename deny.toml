# cargo-deny configuration — supply-chain policy for the Rust (src-tauri) crate.
# Phase 2 #2 (SBOM polish + supply-chain hygiene). Deliberately minimal: it
# covers licenses, security advisories, banned crates, and trusted sources only.
#
# Run locally from the repo root:
#   cargo deny --manifest-path src-tauri/Cargo.toml check
# Enforced at release time by .github/workflows/release.yml (cargo-deny-action).
#
# Prefer a justified `[advisories].ignore` entry over disabling a whole check.

[graph]
# Portcode ships Windows-first; evaluate the graph for the MSVC target so the
# policy reflects what is actually distributed. Add targets here as platforms land.
targets = ["x86_64-pc-windows-msvc"]
all-features = true

[advisories]
version = 2
# RustSec advisory database. With version = 2, vulnerabilities and unsound crates
# are hard errors and yanked crates warn. Add IDs to `ignore` only with a written
# justification (below).
db-urls = ["https://github.com/rustsec/advisory-db"]
# All five entries are `unmaintained` advisories (informational — NOT
# vulnerabilities and NOT unsound) for the abandoned rust-unic crate family
# (RustSec advisory-db issue #2414). They are pulled in transitively by Tauri
# itself (urlpattern → tauri-utils → tauri); there is no safe upgrade until
# upstream migrates off urlpattern, so Portcode cannot remediate them directly.
# Vulnerability/unsound advisories remain hard failures, as does any unmaintained
# crate NOT listed here. Re-audit and trim this list on every Tauri upgrade.
# (Owner alternative: drop these IDs and set `unmaintained = "workspace"` to waive
# all *transitive* unmaintained advisories in one policy instead.)
ignore = [
  "RUSTSEC-2025-0075", # unic-char-range    — unmaintained (tauri → urlpattern)
  "RUSTSEC-2025-0080", # unic-common        — unmaintained (tauri → urlpattern)
  "RUSTSEC-2025-0081", # unic-char-property — unmaintained (tauri → urlpattern)
  "RUSTSEC-2025-0098", # unic-ucd-version   — unmaintained (tauri → urlpattern)
  "RUSTSEC-2025-0100", # unic-ucd-ident     — unmaintained (tauri → urlpattern)
]

[licenses]
version = 2
# Allow-list derived from the actual dependency tree, restricted to the Windows
# (MSVC) graph that ships — every crate satisfies at least one of these via its
# SPDX expression. The non-obvious entries (Unicode-3.0, ISC, BSD-2-Clause,
# BSD-3-Clause) are mandatory because they appear inside `AND` expressions, not
# just `OR` alternatives. BSD-2-Clause (arrayref, spez, zerocopy) and
# CDLA-Permissive-2.0 (webpki-roots — the rustls cert-root bundle) entered the
# Windows graph with the iroh 1.0 TLS/QUIC transport (Phone Sync); both are
# permissive and compatible with this Apache-2.0 project.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
# Duplicate transitive versions are unavoidable in a large Tauri tree (several
# windows-sys majors, etc.); warn rather than fail so releases aren't blocked.
multiple-versions = "warn"
# Published deps pin caret requirements ("2", "1") — never literal "*" wildcards,
# which stay denied. The one exception is WORKSPACE-INTERNAL path deps (e.g. the
# desktop crate's `portcode-sync = { path = ... }`): a path-only dependency has no
# version requirement, which cargo-deny reports as a wildcard. `allow-wildcard-paths`
# permits that for private/path crates only — an unpinned crates.io dep still fails.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# Only crates.io is trusted. There are no git or alternate-registry dependencies
# today; deny them so a supply-chain swap to an unknown source fails loudly.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
