# Fast Rust feedback loop for Portcode self-dev mode.
#
#   Install once:  cargo install --locked bacon
#   Run:           pnpm watch:rust        (from the repo root)
#
# `check` is the default job: it surfaces type/borrow errors in seconds WITHOUT
# producing a binary (far cheaper than a full `cargo build`), which is the whole
# point on a low-RAM dev machine where a full Tauri build is minutes long.
#
# `clippy-ci` mirrors the CI lint gate (`cargo clippy --all-targets -- -D
# warnings`) so local feedback matches what `main` enforces. Heavy `cargo test`
# / full builds are intentionally left to CI (see CLAUDE.md → Testing & coverage).

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.clippy-ci]
command = ["cargo", "clippy", "--all-targets", "--color", "always", "--", "-D", "warnings"]
need_stdout = false
