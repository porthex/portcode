# MANDATORY for getrandom 0.3 on wasm: without this cfg flag the build fails
# with "the wasm_js backend requires the getrandom_backend cfg". Pairs with the
# getrandom features=["wasm_js"] in Cargo.toml. (Plan §4.1 / §5.3.)
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", 'getrandom_backend="wasm_js"']

[build]
target = "wasm32-unknown-unknown"
